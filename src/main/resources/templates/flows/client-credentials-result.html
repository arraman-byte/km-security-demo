<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Client Credentials result', ~{::main})}">
<body>
<main>
  <h1>Client Credentials result</h1>

  <div th:if="${result.status == 'error'}" class="panel bad">
    <h3 style="margin-top:0;">Token request failed</h3>
    <p th:text="${result.errorMessage}">err</p>
    <p style="color:var(--muted);font-size:0.85rem;" th:if="${result.errorType}"
       th:text="'Exception: ' + ${result.errorType}">type</p>
  </div>

  <div th:if="${result.status == 'ok'}">
    <div th:replace="~{fragments/token-card :: tokenCard('Access Token (service account)', ${result.accessToken})}"></div>

    <div class="panel">
      <h3 style="margin-top:0;">Call resource server</h3>
      <p>Used the access token above to call <code class="inline" th:text="${result.apiUrl}">url</code>.</p>
      <p>
        HTTP status:
        <span class="badge good" th:if="${result.apiStatus == 200}">200 OK</span>
        <span class="badge bad" th:if="${result.apiStatus != 200}" th:text="${result.apiStatus}">code</span>
      </p>
      <pre th:text="${result.apiResponse}">resp</pre>
    </div>
  </div>

  <p style="margin-top:20px;">
    <a class="btn secondary" th:href="@{/flows/client-credentials}">&larr; Back</a>
    <a class="btn" th:href="@{/demo/client-credentials/run}">Re-run</a>
  </p>
</main>
</body>
</html>
