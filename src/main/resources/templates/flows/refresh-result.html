<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout('Refresh result', ~{::main})}">
<body>
<main>
  <h1>Refresh result</h1>

  <div th:if="${error}" class="panel bad">
    <p th:text="${error}">err</p>
  </div>

  <div th:if="${!error}">
    <div class="panel good">
      <h3 style="margin-top:0;">Outcome</h3>
      <dl class="kv">
        <dt>previous expiry</dt><dd th:text="${before.expiresAt}">t</dd>
        <dt>new expiry</dt><dd th:text="${newAccessToken != null ? newAccessToken.expiresAt : null}">t</dd>
        <dt>refresh_token rotated</dt>
        <dd>
          <span class="badge good" th:if="${rotated}">yes (new refresh_token issued)</span>
          <span class="badge warn" th:if="${!rotated}">no (same refresh_token)</span>
        </dd>
      </dl>
    </div>

    <div th:replace="~{fragments/token-card :: tokenCard('Previous Access Token', ${previousAccessToken})}"></div>
    <div th:replace="~{fragments/token-card :: tokenCard('New Access Token', ${newAccessToken})}"></div>
    <div th:replace="~{fragments/token-card :: tokenCard('New Refresh Token', ${newRefreshToken})}"></div>
  </div>

  <p style="margin-top:20px;">
    <a class="btn secondary" th:href="@{/flows/refresh}">&larr; Back</a>
    <a class="btn" th:href="@{/demo/refresh-info/run}">Refresh again</a>
  </p>
</main>
</body>
</html>
