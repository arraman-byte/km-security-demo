spring.application.name=securityDemo
server.port=8081

# Resource server (Bearer JWT for /api/**)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/auth-server

# OIDC provider (Keycloak realm discovery)
spring.security.oauth2.client.provider.keycloak.issuer-uri=http://localhost:8080/realms/auth-server

# Public browser client: Authorization Code + PKCE (no client secret)
spring.security.oauth2.client.registration.keycloak-pkce.provider=keycloak
spring.security.oauth2.client.registration.keycloak-pkce.client-id=${KEYCLOAK_PKCE_CLIENT_ID:security-demo-pkce}
spring.security.oauth2.client.registration.keycloak-pkce.client-name=Keycloak (PKCE)
spring.security.oauth2.client.registration.keycloak-pkce.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak-pkce.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.keycloak-pkce.client-authentication-method=none
spring.security.oauth2.client.registration.keycloak-pkce.scope=openid,profile,email,offline_access

# Raw Authorization Code (confidential, no PKCE) -- contrast with PKCE
spring.security.oauth2.client.registration.keycloak-authcode.provider=keycloak
spring.security.oauth2.client.registration.keycloak-authcode.client-id=${KEYCLOAK_AUTHCODE_CLIENT_ID:security-demo-authcode}
spring.security.oauth2.client.registration.keycloak-authcode.client-secret=${KEYCLOAK_AUTHCODE_CLIENT_SECRET:authcode-secret}
spring.security.oauth2.client.registration.keycloak-authcode.client-name=Keycloak (Auth Code, no PKCE)
spring.security.oauth2.client.registration.keycloak-authcode.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak-authcode.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.keycloak-authcode.scope=openid,profile,email,offline_access

# Machine client: client credentials (secret from environment in real demos)
spring.security.oauth2.client.registration.keycloak-m2m.provider=keycloak
spring.security.oauth2.client.registration.keycloak-m2m.client-id=${KEYCLOAK_M2M_CLIENT_ID:security-demo-m2m}
spring.security.oauth2.client.registration.keycloak-m2m.client-secret=${KEYCLOAK_M2M_CLIENT_SECRET:m2m-secret}
spring.security.oauth2.client.registration.keycloak-m2m.authorization-grant-type=client_credentials
spring.security.oauth2.client.registration.keycloak-m2m.scope=openid

# Base URL for server-side M2M demo calling this app's /api/**
demo.app-base-url=http://localhost:${server.port}

# Keycloak issuer (mirrored here for raw HTTP demos: device, implicit)
demo.keycloak.issuer-uri=http://localhost:8080/realms/auth-server

# Device Code public client
demo.device.client-id=${KEYCLOAK_DEVICE_CLIENT_ID:security-demo-device}

# Implicit (teaching-only) public client
demo.implicit.client-id=${KEYCLOAK_IMPLICIT_CLIENT_ID:security-demo-implicit}

# Local-demo: render full tokens in the UI. NEVER set true in production.
demo.expose-tokens=true
