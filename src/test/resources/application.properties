# Avoid contacting Keycloak during test context startup for JWT decoding.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://127.0.0.1:9/jwks

# M2M demo should not call the real app during tests.
demo.app-base-url=http://127.0.0.1:9

# Demo properties (kept off the network).
demo.keycloak.issuer-uri=http://127.0.0.1:9/realms/auth-server
demo.device.client-id=test-device
demo.implicit.client-id=test-implicit
demo.expose-tokens=true
